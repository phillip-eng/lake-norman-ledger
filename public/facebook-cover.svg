<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 312" width="820" height="312" role="img">
  <title>Lake Norman Ledger — Facebook Cover Photo</title>

  <!-- Background -->
  <rect width="820" height="312" fill="#090E1A"/>

  <!-- Subtle grid overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="820" height="312" fill="url(#grid)"/>

  <!-- Radial glow top-left -->
  <radialGradient id="glow" cx="30%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#090E1A" stop-opacity="0"/>
  </radialGradient>
  <rect width="820" height="312" fill="url(#glow)"/>

  <!-- Corner brackets -->
  <path d="M 28 56 L 28 28 L 56 28" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M 792 56 L 792 28 L 764 28" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M 28 256 L 28 284 L 56 284" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M 792 256 L 792 284 L 764 284" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>

  <!-- ── LEFT SIDE: Logo + Info ─────────────────────────── -->

  <!-- Ledger book icon -->
  <!-- Back cover -->
  <rect x="52" y="86" width="62" height="80" rx="4" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.35"/>
  <!-- Front cover -->
  <rect x="62" y="76" width="62" height="80" rx="4" fill="#162035" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- Spine -->
  <line x1="62" y1="76" x2="62" y2="156" stroke="#C9A84C" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Ruled lines -->
  <line x1="74" y1="93" x2="112" y2="93" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="74" y1="106" x2="112" y2="106" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="74" y1="119" x2="112" y2="119" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="74" y1="132" x2="112" y2="132" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Column divider -->
  <line x1="100" y1="78" x2="100" y2="152" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="140" y="112" font-family="Georgia, serif" font-size="18" font-weight="normal" fill="#EEE8D8" letter-spacing="4">LAKE NORMAN</text>
  <text x="140" y="136" font-family="Georgia, serif" font-size="18" font-weight="normal" fill="#C9A84C" letter-spacing="9">LEDGER</text>

  <!-- Thin rule under wordmark -->
  <line x1="140" y1="148" x2="330" y2="148" stroke="#C9A84C" stroke-width="0.6" opacity="0.35"/>

  <!-- Tagline -->
  <text x="141" y="163" font-family="Georgia, serif" font-size="9.5" fill="#4F637D" letter-spacing="2.5" font-style="italic">Professional Bookkeeping</text>

  <!-- Divider line between logo area and contact -->
  <line x1="52" y1="184" x2="330" y2="184" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>

  <!-- Contact details -->
  <text x="52" y="204" font-family="Georgia, serif" font-size="10" fill="#8B9EBB" letter-spacing="1">Phillip@lakenormanledger.com</text>
  <text x="52" y="220" font-family="Georgia, serif" font-size="10" fill="#8B9EBB" letter-spacing="1">(559) 360-9334  ·  Lake Norman, NC  ·  Fully Remote</text>

  <!-- Value prop -->
  <text x="52" y="250" font-family="Georgia, serif" font-size="11" fill="#C9A84C" letter-spacing="0.5" font-style="italic">Owned &amp; Operated by a Licensed CPA</text>

  <!-- ── VERTICAL DIVIDER ───────────────────────────────── -->
  <line x1="368" y1="44" x2="368" y2="268" stroke="#C9A84C" stroke-width="0.7" opacity="0.25"/>

  <!-- ── RIGHT SIDE: Services ───────────────────────────── -->

  <!-- Section label -->
  <text x="600" y="60" font-family="Georgia, serif" font-size="9" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.85">WHAT WE OFFER</text>
  <line x1="400" y1="70" x2="800" y2="70" stroke="#C9A84C" stroke-width="0.6" opacity="0.25"/>

  <!-- Service 1 -->
  <text x="400" y="104" font-family="Georgia, serif" font-size="13.5" font-weight="bold" fill="#EEE8D8" letter-spacing="0.5">Monthly Bookkeeping</text>
  <text x="400" y="120" font-family="Georgia, serif" font-size="10.5" fill="#8B9EBB">Accurate, tax-ready books delivered every month — on time.</text>

  <line x1="400" y1="134" x2="800" y2="134" stroke="#C9A84C" stroke-width="0.5" opacity="0.18"/>

  <!-- Service 2 -->
  <text x="400" y="158" font-family="Georgia, serif" font-size="13.5" font-weight="bold" fill="#EEE8D8" letter-spacing="0.5">Cleanup &amp; Catch-Up</text>
  <text x="400" y="174" font-family="Georgia, serif" font-size="10.5" fill="#8B9EBB">Behind on your books? We rebuild and organize everything fast.</text>

  <line x1="400" y1="188" x2="800" y2="188" stroke="#C9A84C" stroke-width="0.5" opacity="0.18"/>

  <!-- Service 3 -->
  <text x="400" y="212" font-family="Georgia, serif" font-size="13.5" font-weight="bold" fill="#EEE8D8" letter-spacing="0.5">Consulting &amp; Training</text>
  <text x="400" y="228" font-family="Georgia, serif" font-size="10.5" fill="#8B9EBB">QuickBooks Online setup, training, and periodic accuracy reviews.</text>

  <line x1="400" y1="244" x2="800" y2="244" stroke="#C9A84C" stroke-width="0.6" opacity="0.25"/>

  <!-- CTA -->
  <text x="600" y="266" font-family="Georgia, serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="3" opacity="0.8">lakenormanledger.com</text>
</svg>
