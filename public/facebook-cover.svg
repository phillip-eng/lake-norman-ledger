  <text x="365" y="74" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#EEE8D8">Monthly Bookkeeping</text>
  <text x="365" y="90" font-family="Georgia, serif" font-size="10" fill="#8B9EBB">Accurate, tax-ready books delivered every month — on time.</text>
  <line x1="365" y1="102" x2="795" y2="102" stroke="#C9A84C" stroke-width="0.4" opacity="0.18"/>

  <!-- Service 2 -->
  <text x="365" y="124" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#EEE8D8">Cleanup &amp; Catch-Up</text>
  <text x="365" y="140" font-family="Georgia, serif" font-size="10" fill="#8B9EBB">Behind on your books? We rebuild and organize everything fast.</text>
  <line x1="365" y1="152" x2="795" y2="152" stroke="#C9A84C" stroke-width="0.4" opacity="0.18"/>

  <!-- Service 3 -->
  <text x="365" y="174" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#EEE8D8">Consulting &amp; Training</text>
  <text x="365" y="190" font-family="Georgia, serif" font-size="10" fill="#8B9EBB">QuickBooks setup, training, and periodic accuracy reviews.</text>
  <line x1="365" y1="202" x2="795" y2="202" stroke="#C9A84C" stroke-width="0.5" opacity="0.22"/>

  <!-- CTA website -->
  <text x="580" y="222" font-family="Georgia, serif" font-size="10" fill="#C9A84C" text-anchor="middle" letter-spacing="2.5" opacity="0.85">lakenormanledger.com</text>

  <!-- ── LEFT LOWER: Value props — pushed up, above profile pic zone ── -->
  <!-- Profile pic safe line guidance: avoid x:0-200, y:190-312 on desktop -->
  <!-- We place content above y:185 on the left -->

  <line x1="36" y1="110" x2="310" y2="110" stroke="#C9A84C" stroke-width="0.5" opacity="0.18"/>

  <text x="36" y="132" font-family="Georgia, serif" font-size="11.5" fill="#EEE8D8" letter-spacing="0.3">Owned &amp; Operated by a Licensed CPA</text>
  <text x="36" y="152" font-family="Georgia, serif" font-size="10" fill="#8B9EBB" letter-spacing="0.3">Big 4 accounting experience serving small businesses.</text>

