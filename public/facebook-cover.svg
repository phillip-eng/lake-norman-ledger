  <line x1="0" y1="0" x2="820" y2="0" stroke="#C9A84C" stroke-width="2.5"/>

  <!-- Ledger book icon — top left, safe zone -->
  <rect x="36" y="22" width="44" height="56" rx="3" fill="none" stroke="#C9A84C" stroke-width="1.3" opacity="0.35"/>
  <rect x="44" y="16" width="44" height="56" rx="3" fill="#162035" stroke="#C9A84C" stroke-width="1.3"/>
  <line x1="44" y1="16" x2="44" y2="72" stroke="#C9A84C" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="53" y1="26" x2="78" y2="26" stroke="#C9A84C" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="53" y1="35" x2="78" y2="35" stroke="#C9A84C" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="53" y1="44" x2="78" y2="44" stroke="#C9A84C" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="53" y1="53" x2="78" y2="53" stroke="#C9A84C" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="70" y1="18" x2="70" y2="68" stroke="#C9A84C" stroke-width="0.7" opacity="0.4"/>

