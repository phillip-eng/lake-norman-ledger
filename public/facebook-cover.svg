  <text x="580" y="36" font-family="Georgia, serif" font-size="8.5" fill="#C9A84C" text-anchor="middle" letter-spacing="4" opacity="0.8">WHAT WE OFFER</text>
  <line x1="365" y1="46" x2="795" y2="46" stroke="#C9A84C" stroke-width="0.5" opacity="0.22"/>

