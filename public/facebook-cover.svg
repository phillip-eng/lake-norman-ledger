    </pattern>
    <radialGradient id="glow" cx="75%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#090E1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="820" height="312" fill="url(#grid)"/>
  <rect width="820" height="312" fill="url(#glow)"/>

  <!-- Corner brackets — only top corners + bottom-right (avoid bottom-left — profile pic zone) -->
  <path d="M 28 56 L 28 28 L 56 28" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M 792 56 L 792 28 L 764 28" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M 792 256 L 792 284 L 764 284" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- ── TOP BAND: Logo + Tagline centered ───────────────── -->
