<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130" role="img" aria-label="Lake Norman Ledger">
  <title>Lake Norman Ledger</title>

  <!-- Background -->
  <rect width="480" height="130" fill="#090E1A" rx="8"/>

  <!-- Book icon: back cover shadow -->
  <rect x="20" y="22" width="52" height="68" rx="4" fill="none" stroke="#C9A84C" stroke-width="1.8" opacity="0.4"/>

  <!-- Book icon: front cover -->
  <rect x="30" y="14" width="52" height="68" rx="4" fill="#162035" stroke="#C9A84C" stroke-width="1.8"/>

  <!-- Spine -->
  <line x1="30" y1="14" x2="30" y2="82" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>

  <!-- Ledger ruled lines -->
  <line x1="42" y1="30" x2="72" y2="30" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="42" y1="42" x2="72" y2="42" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="42" y1="54" x2="72" y2="54" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="42" y1="66" x2="72" y2="66" stroke="#C9A84C" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Column divider inside book -->
  <line x1="60" y1="22" x2="60" y2="80" stroke="#C9A84C" stroke-width="1" opacity="0.45"/>

  <!-- Wordmark -->
  <text x="102" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="normal" fill="#EEE8D8" letter-spacing="5">LAKE NORMAN</text>
  <text x="102" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="normal" fill="#C9A84C" letter-spacing="11">LEDGER</text>

  <!-- Thin rule -->
  <line x1="102" y1="88" x2="430" y2="88" stroke="#C9A84C" stroke-width="0.7" opacity="0.35"/>

  <!-- Tagline -->
  <text x="103" y="106" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#4F637D" letter-spacing="2.5">Professional Bookkeeping</text>
</svg>
