<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="130" fill="#090E1A" rx="8"/>

  <!-- Icon: four ruled lines of descending width — like a financial statement -->
  <!-- Gold top line (header row) -->
  <line x1="18" y1="32" x2="78" y2="32" stroke="#C9A84C" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Full-width line -->
  <line x1="18" y1="47" x2="78" y2="47" stroke="#EEE8D8" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
  <!-- Partial line with right gap — like a subtotal -->
  <line x1="18" y1="62" x2="68" y2="62" stroke="#EEE8D8" stroke-width="1.4" stroke-linecap="round" opacity="0.45"/>
  <!-- Short line — indented sub-entry -->
  <line x1="28" y1="77" x2="78" y2="77" stroke="#EEE8D8" stroke-width="1.4" stroke-linecap="round" opacity="0.25"/>
  <!-- Bottom total line — double rule in gold -->
  <line x1="18" y1="91" x2="78" y2="91" stroke="#C9A84C" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="18" y1="96" x2="78" y2="96" stroke="#C9A84C" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>

  <!-- Vertical separator -->
  <line x1="100" y1="22" x2="100" y2="104" stroke="#C9A84C" stroke-width="0.6" opacity="0.25"/>

  <!-- Wordmark — large elegant treatment -->
  <text x="118" y="60" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="38" font-weight="300" fill="#EEE8D8" letter-spacing="1">Lake Norman</text>

  <!-- Gold accent underscore -->
  <rect x="118" y="67" width="290" height="2" fill="#C9A84C" rx="1" opacity="0.9"/>

  <text x="119" y="90" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="14" font-weight="400" fill="#8B9EBB" letter-spacing="8">LEDGER</text>

  <!-- Small CPA badge -->
  <rect x="358" y="76" width="42" height="18" rx="3" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
  <text x="379" y="89" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="9.5" fill="#C9A84C" text-anchor="middle" letter-spacing="1.5" opacity="0.7">CPA</text>
</svg>
