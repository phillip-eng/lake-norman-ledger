<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="130" fill="#090E1A" rx="8"/>

  <!-- Book icon: back cover -->
  <rect x="20" y="22" width="52" height="68" rx="4" fill="none" stroke="#C9A84C" stroke-width="1.8" opacity="0.45"/>

  <!-- Book icon: front cover -->
  <rect x="28" y="16" width="52" height="68" rx="4" fill="#162035" stroke="#C9A84C" stroke-width="1.8"/>

  <!-- Spine line -->
  <line x1="28" y1="16" x2="28" y2="84" stroke="#C9A84C" stroke-width="2.5"/>

  <!-- Ledger ruled lines -->
  <line x1="38" y1="30" x2="70" y2="30" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="40" x2="70" y2="40" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="50" x2="70" y2="50" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="60" x2="70" y2="60" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Column divider inside book -->
  <line x1="58" y1="26" x2="58" y2="72" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="100" y="54" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="22" font-weight="400" fill="#EEE8D8" letter-spacing="5">LAKE NORMAN</text>
  <text x="100" y="78" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="22" font-weight="300" fill="#C9A84C" letter-spacing="11.5">LEDGER</text>

  <!-- Tagline -->
  <text x="100" y="100" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="11" fill="#4F637D" letter-spacing="2.5" font-style="italic">Professional Bookkeeping</text>

  <!-- Gold accent line between name and tagline -->
  <line x1="100" y1="90" x2="380" y2="90" stroke="#C9A84C" stroke-width="0.6" opacity="0.3"/>
</svg>
