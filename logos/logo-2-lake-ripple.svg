<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 130" width="480" height="130">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="130" fill="#090E1A" rx="8"/>

  <!-- Lake ripple icon: concentric arcs suggesting water -->
  <path d="M 22 72 Q 38 44 55 72" fill="none" stroke="#C9A84C" stroke-width="2" stroke-linecap="round" opacity="1"/>
  <path d="M 14 80 Q 38 38 62 80" fill="none" stroke="#C9A84C" stroke-width="1.6" stroke-linecap="round" opacity="0.65"/>
  <path d="M  6 88 Q 38 32 70 88" fill="none" stroke="#C9A84C" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- Small dot at apex — representing a point on the lake -->
  <circle cx="38" cy="56" r="2.5" fill="#C9A84C"/>

  <!-- Vertical divider -->
  <line x1="92" y1="24" x2="92" y2="100" stroke="#C9A84C" stroke-width="0.7" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="110" y="52" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="13" font-weight="400" fill="#8B9EBB" letter-spacing="4">LAKE NORMAN</text>
  <text x="108" y="80" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="34" font-weight="300" fill="#EEE8D8" letter-spacing="2">Ledger</text>

  <!-- Gold underline accent on Ledger -->
  <line x1="110" y1="87" x2="310" y2="87" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="111" y="104" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="10.5" fill="#4F637D" letter-spacing="3" font-style="italic">CPA-Backed Bookkeeping</text>
</svg>
